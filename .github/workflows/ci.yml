##############################################################################
# FleetGuardian AI – CI/CD Pipeline
# Triggers: push / PR to main
##############################################################################

name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.10"
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Backend – Lint + Test
  # ──────────────────────────────────────────────────────────────────────────
  backend:
    name: "Backend – Lint & Test"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: fleetadmin
          POSTGRES_PASSWORD: fleetsecret
          POSTGRES_DB: fleetguardian_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install system dependencies (OpenCV)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends libgl1-mesa-glx libglib2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          # Fail on syntax errors and undefined names; warn on style
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Check formatting with black
        run: black --check --line-length=120 app/

      - name: Run pytest
        env:
          DATABASE_URL: "postgresql+psycopg2://fleetadmin:fleetsecret@localhost:5432/fleetguardian_test"
          SECRET_KEY: "ci-test-secret-key"
          ALGORITHM: "HS256"
          ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
          PYTHONPATH: "."
        run: |
          pytest tests/ -v --tb=short --basetemp=./tmp_pytest

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Frontend – Lint + Build
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    name: "Frontend – Lint & Build"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter (oxlint)
        run: npm run lint

      - name: Build Vite app
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: Docker – Build all images
  # ──────────────────────────────────────────────────────────────────────────
  docker-build:
    name: "Docker – Build Images"
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: false
          tags: fleetguardian-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          tags: fleetguardian-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate docker-compose syntax
        run: docker compose config --quiet

  # ──────────────────────────────────────────────────────────────────────────
  # Job 4: Summary
  # ──────────────────────────────────────────────────────────────────────────
  ci-success:
    name: "CI Success"
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker-build]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.backend.result }}" != "success" ]] || \
             [[ "${{ needs.frontend.result }}" != "success" ]] || \
             [[ "${{ needs.docker-build.result }}" != "success" ]]; then
            echo "One or more jobs failed."
            exit 1
          fi
          echo "All CI jobs passed ✅"
