##############################################################################
# FleetGuardian AI – Nginx Reverse Proxy Configuration
# HTTP only.  SSL/TLS can be added later via Let's Encrypt (Certbot).
##############################################################################

upstream backend_api {
    server backend:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_proxied any;
    gzip_min_length 256;

    # ── Security headers (basic hardening) ─────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ── Static Frontend (Vite/React build output) ───────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;  # SPA fallback
    }

    # ── REST API proxy → FastAPI ─────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend_api/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Health endpoint proxy ───────────────────────────────────────────────
    location /health {
        proxy_pass         http://backend_api/health;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── WebSocket proxy (video & alerts) ────────────────────────────────────
    location /ws/ {
        proxy_pass         http://backend_api/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── Prometheus metrics passthrough (backend internal) ───────────────────
    location /metrics {
        proxy_pass http://backend_api/metrics;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Static asset caching ─────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Custom error pages ───────────────────────────────────────────────────
    error_page 404              /index.html;
    error_page 500 502 503 504  /index.html;
}
