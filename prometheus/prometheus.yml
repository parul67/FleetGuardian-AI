##############################################################################
# FleetGuardian AI – Prometheus Scrape Configuration
##############################################################################

global:
  scrape_interval:     15s   # How often to scrape targets
  evaluation_interval: 15s   # How often to evaluate alerting rules
  external_labels:
    monitor: "fleetguardian-monitor"

# ── Alert rules ────────────────────────────────────────────────────────────────
# (Uncomment and point to a rules file when you add alerting)
# rule_files:
#   - "rules/*.yml"

# ── Scrape configurations ──────────────────────────────────────────────────────
scrape_configs:

  # ── Prometheus itself ──────────────────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  # Exposes /metrics (via prometheus-fastapi-instrumentator or starlette-exporter)
  - job_name: "fleetguardian-backend"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["backend:8000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "fleetguardian-backend"

  # ── Postgres Exporter (optional – add postgres-exporter service to enable) ─
  # - job_name: "postgres"
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]
