# FleetGuardian AI – Model Training Configuration

model_training:

  # ── Output paths ────────────────────────────────────────────
  model_dir: "models"
  best_model_filename: "best_model.joblib"
  training_report_path: "docs/training_report.md"
  evaluation_report_path: "docs/model_evaluation.md"

  # ── Engineered dataset paths ────────────────────────────────
  train_csv: "datasets/processed/train_engineered.csv"
  test_csv:  "datasets/processed/test_engineered.csv"

  # ── Target column ───────────────────────────────────────────
  target_column: risk_level

  # ── Cross-validation ────────────────────────────────────────
  cv_folds: 5
  scoring: accuracy          # accuracy | f1_weighted | roc_auc_ovr
  random_state: 42
  n_jobs: -1                 # -1 = use all CPU cores

  # ── Class labels (ordinal mapping applied by preprocessing) ─
  class_names:
    - low
    - medium
    - high

  # ── Model registry + hyperparameter grids ───────────────────
  models:

    random_forest:
      enabled: true
      class: "sklearn.ensemble.RandomForestClassifier"
      fixed_params:
        random_state: 42
      param_grid:
        classifier__n_estimators: [100, 200]
        classifier__max_depth: [6, 10, null]
        classifier__min_samples_split: [2, 5]

    gradient_boosting:
      enabled: true
      class: "sklearn.ensemble.GradientBoostingClassifier"
      fixed_params:
        random_state: 42
      param_grid:
        classifier__n_estimators: [100, 200]
        classifier__learning_rate: [0.05, 0.1]
        classifier__max_depth: [3, 5]

    xgboost:
      enabled: true
      class: "xgboost.XGBClassifier"
      fixed_params:
        random_state: 42
        eval_metric: mlogloss
        verbosity: 0
      param_grid:
        classifier__n_estimators: [100, 200]
        classifier__learning_rate: [0.05, 0.1]
        classifier__max_depth: [3, 6]

    logistic_regression:
      enabled: true
      class: "sklearn.linear_model.LogisticRegression"
      fixed_params:
        random_state: 42
        max_iter: 1000
      param_grid:
        classifier__C: [0.1, 1.0, 10.0]
        classifier__solver: [lbfgs, saga]
