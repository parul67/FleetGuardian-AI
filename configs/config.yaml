# FleetGuardian AI Configuration File

# Models Configuration
models:
  yolo_model_path: "yolo11n.pt"  # Pre-downloaded in workspace root or download target
  face_landmarker_path: "face_landmarker.task"
  pose_landmarker_path: "pose_landmarker.task"

# Camera Settings
camera:
  source: 0  # 0 for default webcam, or string for RTSP/IP stream/video file
  width: 640
  height: 480
  fps: 30
  auto_reconnect: true
  reconnect_delay: 5.0  # seconds
  buffer_size: 5

# Image Preprocessing Settings
preprocessing:
  target_width: 640
  target_height: 640
  normalize: true
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

# Thresholds for Behavior & Safety Detection
thresholds:
  yolo_conf: 0.45
  yolo_iou: 0.45
  face_conf: 0.5
  face_presence_conf: 0.5
  blink_ear_threshold: 0.18
  blink_duration_max: 0.4  # seconds
  blink_duration_min: 0.05  # seconds
  yawn_mar_threshold: 0.25
  distraction_threshold: 0.25
  drowsiness_time_threshold: 2.0  # seconds eyes closed to trigger critical alert

# Video Settings
video:
  output_format: "mp4v"
  output_fps: 30.0
  output_width: 640
  output_height: 480

# Logging Configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  console_output: true
  file_output: true
  log_file_path: "logs/fleetguardian.log"
  max_bytes: 10485760  # 10MB
  backup_count: 5
