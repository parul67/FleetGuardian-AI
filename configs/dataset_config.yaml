# Dataset Generation config — appended to configs/config.yaml
dataset:
  output_dir: "datasets/telemetry"
  csv_filename: "fleet_telemetry.csv"
  max_records: 100000
  auto_export_every: 500          # export CSV after every N records added
  dedup_window: 3                 # seconds – records within this window with same driver/vehicle are deduped
  risk_thresholds:
    low: 0.35
    medium: 0.65
    # above 0.65 → high
  validation:
    ear_range: [0.0, 1.0]
    mar_range: [0.0, 1.0]
    fatigue_score_range: [0.0, 1.0]
    distraction_score_range: [0.0, 1.0]
    speed_range: [0.0, 300.0]     # km/h
    blink_rate_range: [0.0, 60.0] # blinks/min
    lane_offset_range: [-500.0, 500.0]
